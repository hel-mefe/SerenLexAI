##
## SerenLex Nginx reverse proxy (HTTPS -> API)
##
## Notes:
## - Replace `server_name` with your domain.
## - On the VPS, generate certs with certbot so files exist under:
##     /etc/letsencrypt/live/<your-domain>/
## - This config supports HTTP-01 challenges via:
##     /.well-known/acme-challenge/
##

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;

  server_name 163.245.222.46;

  # certbot HTTP-01 challenge webroot
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Everything else -> HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name 163.245.222.46;

  # Self-signed cert (generate via infrastructure/nginx/scripts/generate-self-signed.sh)
  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;

  # API reverse proxy
  location / {
    proxy_pass http://serenlex_api:8000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 300;
    proxy_send_timeout 300;
  }
}

