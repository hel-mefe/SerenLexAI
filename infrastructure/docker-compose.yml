version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: serenlex_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - serenlex_network

  redis:
    image: redis:7-alpine
    container_name: serenlex_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - serenlex_network

  minio:
    image: minio/minio:latest
    container_name: serenlex_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - serenlex_network

  api:
    build:
      context: ../backend
      dockerfile: ../infrastructure/api/Dockerfile
    container_name: serenlex_api
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    networks:
      - serenlex_network

  worker:
    build:
      context: ../backend
      dockerfile: ../infrastructure/worker/Dockerfile
    container_name: serenlex_worker
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - serenlex_network

volumes:
  postgres_data:
  minio_data:

networks:
  serenlex_network:
    driver: bridge
