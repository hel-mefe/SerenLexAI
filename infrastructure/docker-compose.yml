services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: serenlex_postgres
    restart: always
    env_file:
      - ../env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - serenlex_network

  redis:
    image: redis:7-alpine
    container_name: serenlex_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - serenlex_network

  minio:
    image: minio/minio:latest
    container_name: serenlex_minio
    command: server /data --console-address ":9001"
    env_file:
      - ../env/minio.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - serenlex_network

  api:
    build:
      context: ../backend
      dockerfile: ../infrastructure/api/Dockerfile
    container_name: serenlex_api
    restart: always
    env_file:
      - ../env/backend.env
    volumes:
      # Hot reload API code without rebuilding the image
      - ../backend:/app:cached
      # Shared uploads dir for AI worker to read PDFs
      - uploads_data:/app/uploads
      # Shared reports dir for AI worker to write / API to serve report PDFs
      - reports_data:/app/reports
    depends_on:
      - postgres
      - redis
      - minio
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    networks:
      - serenlex_network

  worker:
    build:
      context: ../backend
      dockerfile: ../infrastructure/worker/Dockerfile
    container_name: serenlex_worker
    restart: always
    env_file:
      - ../env/backend.env
    volumes:
      # Mount backend so task code changes are picked up after restart
      - ../backend:/app:cached
    depends_on:
      - postgres
      - redis
    networks:
      - serenlex_network

  ai_worker:
    build:
      context: ../langgraph-ai
      dockerfile: Dockerfile
    container_name: serenlex_ai_worker
    restart: always
    env_file:
      - ../langgraph-ai/.env
    environment:
      # Override for Docker: use container hostnames
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@serenlex_postgres:5432/serenlex
      REDIS_URL: redis://serenlex_redis:6379/0
      # Write generated report PDFs to shared volume for API to serve
      REPORTS_DIR: /app/reports
    # Use the image CMD (uv run python -m celery ...) defined in langgraph-ai/Dockerfile
    volumes:
      # Mount only source to avoid clobbering the image's .venv
      - ../langgraph-ai/src:/app/src:cached
      # Shared uploads dir to read PDFs saved by the API
      - uploads_data:/app/uploads
      # Shared reports dir to write generated report PDFs
      - reports_data:/app/reports
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - serenlex_network

volumes:
  postgres_data:
  minio_data:
  uploads_data:
  reports_data:

networks:
  serenlex_network:
    driver: bridge
